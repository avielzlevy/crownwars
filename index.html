<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crown Wars</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; }
      #hud {
        position: fixed; inset: 0;
        pointer-events: none;
        font-family: monospace;
        color: #fff;
        text-shadow: 0 1px 3px #000;
      }
      #crosshair {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 24px; height: 24px;
        transition: transform 0.1s;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255,255,255,0.9);
        transition: background 0.15s;
      }
      #crosshair::before { width: 2px; height: 100%; top: 0; left: 50%; transform: translateX(-50%); }
      #crosshair::after  { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
      /* Throw-ready state: reticle turns orange and grows */
      #crosshair.throw-ready {
        transform: translate(-50%, -50%) scale(1.4);
      }
      #crosshair.throw-ready::before,
      #crosshair.throw-ready::after {
        background: rgba(255, 160, 30, 0.95);
      }
      #held-item {
        position: absolute;
        bottom: 60px; left: 50%;
        transform: translateX(-50%);
        font-size: 13px;
        opacity: 0.85;
        letter-spacing: 0.05em;
      }
      #sprint-bar-wrap {
        position: absolute;
        bottom: 30px; left: 50%;
        transform: translateX(-50%);
        width: 160px; height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
      }
      #sprint-bar {
        height: 100%; width: 100%;
        background: #fff;
        border-radius: 2px;
        transition: background 0.2s;
      }
      #debug {
        position: absolute;
        top: 10px; left: 10px;
        font-size: 11px;
        opacity: 0.6;
        line-height: 1.6;
      }
      #overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.75);
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        color: #fff; font-family: monospace;
        font-size: 18px;
      }
      #overlay h1 { font-size: 36px; letter-spacing: 0.1em; }
      #overlay p  { font-size: 13px; opacity: 0.6; }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>CROWN WARS</h1>
      <p>Click to start</p>
    </div>
    <div id="hud" style="display:none;">
      <div id="crosshair"></div>
      <div id="held-item"></div>
      <div id="sprint-bar-wrap"><div id="sprint-bar"></div></div>
      <div id="debug"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
